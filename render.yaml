services:
  - type: web
    name: persona-followup-panel
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        sync: false
      - key: TEST_RECIPIENT_EMAIL
        sync: false
      - key: TEST_RECIPIENT_WHATSAPP
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: persona-followup-db
          property: connectionString

databases:
  - name: persona-followup-db
    plan: free
    region: oregon
