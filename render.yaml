services:
  - type: web
    name: persona-followup-panel
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Pin server timezone to UTC so bare datetime strings (if any sneak past
      # validation) never get interpreted in some surprising local zone.
      - key: TZ
        value: UTC
      # Admin login credentials. Server refuses to start without these.
      # Set per-environment in the Render dashboard so the values don't
      # live in source. Rotate by changing the dashboard value and
      # triggering a redeploy — no code change needed.
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Anthropic adapter is wired but DORMANT today — Gemini is the
      # default. To switch the resume generator's Plan + Section calls
      # to Claude, set LLM_PROVIDER=anthropic on this service. Per-
      # purpose overrides also accepted: LLM_PROVIDER_PLAN=anthropic,
      # LLM_PROVIDER_SECTION=anthropic, LLM_PROVIDER_EXTRACT=gemini.
      # Server refuses to call Anthropic if the key isn't set, so this
      # being absent is safe.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: "gemini"
      - key: MAX_FILE_MB
        value: "10"
      # Storage backend for student uploads. Default "local" writes to
      # disk under server/uploads/ — fine for dev, BUT Render's free tier
      # filesystem is ephemeral so every redeploy / cold-start wipes
      # uploaded PDFs. For real students set STORAGE_BACKEND=s3 plus
      # the S3_* vars below (Cloudflare R2 recommended — free up to
      # 10 GB + free egress). All marked sync:false so credentials
      # never live in source.
      - key: STORAGE_BACKEND
        value: "local"
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: persona-followup-db
          property: connectionString

databases:
  - name: persona-followup-db
    plan: free
    region: oregon
