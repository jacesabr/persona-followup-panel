services:
  - type: web
    name: persona-followup-panel
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Pin server timezone to UTC so bare datetime strings (if any sneak past
      # validation) never get interpreted in some surprising local zone.
      - key: TZ
        value: UTC
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        sync: false
      - key: TEST_RECIPIENT_EMAIL
        sync: false
      - key: TEST_RECIPIENT_WHATSAPP
        sync: false
      # Optional Twilio webhook signature validation. Set together with
      # PUBLIC_BASE_URL so validateRequest can match the signed URL.
      - key: TWILIO_AUTH_TOKEN
        sync: false
      # Public base URL used for Twilio status callbacks + signature validation.
      # Set to the Render service URL (https://<service>.onrender.com).
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: persona-followup-db
          property: connectionString

databases:
  - name: persona-followup-db
    plan: free
    region: oregon
